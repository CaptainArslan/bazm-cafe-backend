<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BAZM Socket.IO Test</title>

    <style>
        body {
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
            font-family: Arial, sans-serif;
        }

        #status {
            padding: 16px;
            border-radius: 8px;
            background: #eeeeee;
        }

        #log {
            padding: 16px;
            min-height: 200px;
            overflow: auto;
            color: #ffffff;
            background: #111111;
            border-radius: 8px;
            white-space: pre-wrap;
        }

        button {
            padding: 10px 18px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>BAZM Socket.IO Test</h1>

    <p id="status">Connecting...</p>

    <button id="ping-button" type="button">
        Send Ping
    </button>

    <h2>Event Log</h2>

    <pre id="log"></pre>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/socket-test.js"></script>
</body>

</html>
